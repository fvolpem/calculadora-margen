<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Margen Tubos"/>
<title>Calculadora de Margen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5ea;padding:16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;color:#8e8e93;margin-top:2px}
.container{padding:16px;max-width:600px;margin:0 auto}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:12px 16px;font-size:16px;border:1px solid #e5e5ea;border-radius:12px;background:#fff;color:#1d1d1f;outline:none;-webkit-appearance:none}
.search-wrap input:focus{border-color:#007aff}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e5e5ea;border-radius:12px;max-height:250px;overflow-y:auto;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.dropdown.open{display:block}
.di{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f2f2f7}
.di:last-child{border-bottom:none}
.di:active{background:#f2f2f7}
.di .name{font-size:14px;color:#1d1d1f}
.di .meta{font-size:11px;color:#8e8e93;margin-top:2px;font-family:monospace}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e5e5ea}
.prod-title{font-size:15px;font-weight:600}
.prod-sub{font-size:12px;color:#8e8e93;margin-top:4px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:#e8f4fd;color:#007aff;margin-left:6px;font-weight:500}
.slabel{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.field label{font-size:12px;color:#8e8e93;display:block;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;font-size:16px;border:1px solid #e5e5ea;border-radius:10px;background:#fff;color:#1d1d1f;outline:none;-webkit-appearance:none}
.field input:focus{border-color:#007aff}
.pv-wrap{margin-bottom:4px}
.pv-wrap label{font-size:14px;font-weight:500;display:block;margin-bottom:6px}
.pv-wrap input{width:100%;padding:14px 16px;font-size:20px;border:2px solid #e5e5ea;border-radius:12px;background:#fff;color:#1d1d1f;outline:none;-webkit-appearance:none}
.pv-wrap input:focus{border-color:#007aff}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.metric{background:#f2f2f7;border-radius:12px;padding:12px 8px;text-align:center}
.ml{font-size:11px;color:#8e8e93;margin-bottom:4px}
.mv{font-size:15px;font-weight:600;color:#1d1d1f}
.pos .mv{color:#34c759}
.neg .mv{color:#ff3b30}
.placeholder{text-align:center;padding:40px 20px;color:#c7c7cc;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>Calculadora de margen</h1>
  <p>51 productos cargados</p>
</div>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar por código o nombre..." autocomplete="off"/>
    <div class="dropdown" id="dd"></div>
  </div>
  <div id="result"><div class="placeholder">Buscá un producto para calcular el margen</div></div>
</div>

<script>

  {tipo:"PVC PBA PN6",cod:"06KSOL250",desc:"CAÑO PVC PBA PN 6 KG/CM2 DE 250MM",peso:44,anillo:19400},

  {tipo:"PVC PBA PN6",cod:"06KSOL400",desc:"CAÑO PVC PBA PN 6 KG/CM2 DE 400MM",peso:117,anillo:55100},
  {tipo:"PVC PBA PN10",cod:"10KSOL060",desc:"CAÑO PVC PBA PN 10 KG/CM2 DE 60MM",peso:4.805,anillo:3130},
  {tipo:"PVC PBA PN10",cod:"10KSOL075",desc:"CAÑO PVC PBA PN 10 KG/CM2 DE 75MM",peso:7.2,anillo:2512},

  {tipo:"PVC PBA PN10",cod:"10KSOL200",desc:"CAÑO PVC PBA PN 10 KG/CM2 DE 200MM",peso:51.625,anillo:13600},
  {tipo:"PVC PBA PN10",cod:"10KSOL250",desc:"CAÑO PVC PBA PN 10 KG/CM2 DE 250MM",peso:79.3,anillo:19400},
  {tipo:"PVC SOL 6K",cod:"SOL06K040",desc:"CAÑO PVC SOLDABLE DE 40 MM 6 K.",peso:1.55,anillo:0},
  {tipo:"PVC SOL 6K",cod:"SOL06K050",desc:"CAÑO PVC SOLDABLE DE 50 MM 6 K.",peso:2.35,anillo:0},
  {tipo:"PVC SOL 6K",cod:"SOL06K060",desc:"CAÑO PVC SOLDABLE DE 60 MM 6 K.",peso:3.489,anillo:0},
  {tipo:"PVC SOL 6K",cod:"SOL06K075",desc:"CAÑO PVC SOLDABLE DE 75 MM 6 K.",peso:5.192,anillo:0},

  {tipo:"PEAD",cod:"CORPOS100",desc:"CAÑO CORPOSANA DE 1 PEAD PE100",peso:0.27,anillo:0},
  {tipo:"PEAD",cod:"CORPOS200",desc:"CAÑO CORPOSANA DE 2 PEAD PE100",peso:1.03,anillo:0},
  {tipo:"PEAD",cod:"CORPOS400",desc:"CAÑO CORPOSANA DE 4 PEAD PE100",peso:4,anillo:0}
];

var selected = null;
function isPEAD(t){ return t === "PEAD"; }
function fmt(n){ return Math.round(n).toLocaleString("es-PY"); }
function def(t){ return isPEAD(t) ? DEF.PEAD : DEF.PVC; }

document.getElementById("search").addEventListener("input", onSearch);
document.addEventListener("click", function(e){
  if (!e.target.closest(".search-wrap")) document.getElementById("dd").classList.remove("open");
});

function onSearch(){
  var q = document.getElementById("search").value.toLowerCase().trim();
  var dd = document.getElementById("dd");
  if (!q){ dd.classList.remove("open"); return; }
  var m = products.filter(function(p){
    return p.cod.toLowerCase().indexOf(q) >= 0 || p.desc.toLowerCase().indexOf(q) >= 0;
  }).slice(0,12);
  if (!m.length){ dd.classList.remove("open"); return; }
  dd.innerHTML = m.map(function(p){
    return "<div class='di' data-cod='" + p.cod + "'><div class='name'>" + p.desc + "</div><div class='meta'>" + p.cod + " · " + p.tipo + " · " + p.peso + " kg</div></div>";
  }).join("");
  dd.classList.add("open");
  dd.querySelectorAll(".di").forEach(function(el){
    el.addEventListener("click", function(){
      selected = products.find(function(p){ return p.cod === el.dataset.cod; });
      document.getElementById("search").value = selected.cod + " — " + selected.desc;
      dd.classList.remove("open");
      renderResult();
    });
  });
}

function renderResult(){
  var p = selected, d = def(p.tipo);
  document.getElementById("result").innerHTML =
    "<div class='card'>" +
      "<div class='prod-title'>" + p.desc + "<span class='badge'>" + p.tipo + "</span></div>" +
      "<div class='prod-sub'>" + p.cod + " · " + p.peso + " kg" + (p.anillo ? " · anillo Gs " + fmt(p.anillo) : "") + "</div>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='slabel'>Costos Gs/kg</div>" +
      "<div class='grid2'>" +
        "<div class='field'><label>Materia prima</label><input type='number' id='mp' value='" + d.mp + "' inputmode='numeric'/></div>" +
        "<div class='field'><label>Carga fabril</label><input type='number' id='cf' value='" + d.cf + "' inputmode='numeric'/></div>" +
      "</div>" +
      "<div class='pv-wrap'><label>Precio de venta (Gs)</label><input type='number' id='pv' placeholder='0' inputmode='numeric'/></div>" +
    "</div>" +
    "<div class='card'>" +
      "<div class='slabel'>Resultado</div>" +
      "<div class='metrics'>" +
        "<div class='metric' id='mc'><div class='ml'>Costo total</div><div class='mv' id='vc'>—</div></div>" +
        "<div class='metric' id='mg'><div class='ml'>Margen Gs</div><div class='mv' id='vg'>—</div></div>" +
        "<div class='metric' id='mp2'><div class='ml'>Margen %</div><div class='mv' id='vp'>—</div></div>" +
      "</div>" +
    "</div>";
  ["mp","cf","pv"].forEach(function(id){ document.getElementById(id).addEventListener("input", calc); });
}

function calc(){
  var mp = parseFloat(document.getElementById("mp").value) || 0;
  var cf = parseFloat(document.getElementById("cf").value) || 0;
  var pv = parseFloat(document.getElementById("pv").value) || 0;
  var p = selected;
  var costo = p.peso * (mp + cf) + (p.anillo || 0);
  var mgs = pv - costo;
  var mpct = pv > 0 ? (mgs / pv) * 100 : 0;
  document.getElementById("vc").textContent = "Gs " + fmt(costo);
  document.getElementById("vg").textContent = (mgs >= 0 ? "Gs " : "-Gs ") + fmt(Math.abs(mgs));
  document.getElementById("vp").textContent = mpct.toFixed(1) + "%";
  var cls = pv === 0 ? "" : mgs >= 0 ? "pos" : "neg";
  ["mc","mg","mp2"].forEach(function(id){ document.getElementById(id).className = "metric " + cls; });
}
</script>
</body>
</html>
